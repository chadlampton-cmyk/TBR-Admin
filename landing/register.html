<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Test User | Turnbuckle Report Admin</title>
    <link rel="icon" type="image/png" sizes="64x64" href="./favicon.png" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Oswald:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260312-74" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <header class="site-title-corner" aria-label="Site title">
      <p class="title-stranger site-title-text">Doggfather Studio</p>
      <p class="site-title-subtitle">Great stories start with great preparation.</p>
    </header>
    <a class="site-logo-corner" href="./lounge" aria-label="Doggfather Studio home">
      <img class="site-logo-img site-logo-dark" src="./dfswhite.png" alt="Doggfather Studio logo" />
      <img class="site-logo-img site-logo-light" src="./dfsdark.png" alt="" aria-hidden="true" />
    </a>
    <main class="shell">
      <section class="card" aria-labelledby="create-user-title">
        <header class="card-header">
          <p class="eyebrow">Testing Only</p>
          <h1 id="create-user-title" class="title-stranger">Create User</h1>
          <p class="subtitle">This page creates users in the shared backend database.</p>
        </header>

        <form id="register-form" class="login-form" novalidate>
          <label for="new-username">Email or Username</label>
          <input id="new-username" name="username" type="text" autocomplete="username" required />

          <label for="new-password">Password</label>
          <input id="new-password" name="password" type="password" autocomplete="new-password" required />

          <label for="confirm-password">Confirm Password</label>
          <input
            id="confirm-password"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            required
          />

          <label for="new-phone">Mobile Phone (for SMS 2FA)</label>
          <input
            id="new-phone"
            name="phone"
            type="tel"
            autocomplete="tel"
            placeholder="+1 555 123 4567"
            pattern="^\+?[0-9\s().-]{10,20}$"
            minlength="10"
            required
          />

          <button type="submit" class="btn primary">Create User</button>
        </form>
        <p class="form-message hidden" id="register-message" role="status"></p>

        <p class="mini-action">
          Already have a user?
          <a href="./" class="muted-link">Back to sign in</a>
        </p>
      </section>
    </main>

    <script src="./auth.js?v=20260311-92"></script>
    <script src="./register.js?v=20260310-61"></script>
  </body>
</html>
